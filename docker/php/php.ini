; Configuration PHP pour le développement local.
;
; OPcache : en développement, on revérifie les fichiers à CHAQUE requête
; (revalidate_freq = 0) pour que toute modification du code soit prise en
; compte immédiatement, sans avoir à redémarrer le conteneur.
; En production, on mettrait validate_timestamps = 0 pour de meilleures perfs.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Affichage des erreurs en développement (désactivé en production via APP_ENV).
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Taille maximale des envois (utile pour d'éventuels uploads d'images).
upload_max_filesize = 8M
post_max_size = 10M
