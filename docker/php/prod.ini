; Configuration PHP pour la PRODUCTION.
; À copier dans l'image de prod à la place de php.ini (dev).
;
; OPcache : le code est figé, on ne revérifie pas les fichiers à chaque requête
; (validate_timestamps = 0) → performances maximales.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0
opcache.max_accelerated_files = 20000
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16

; Les erreurs ne sont JAMAIS affichées à l'écran en production (fuite d'infos),
; mais elles sont journalisées.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL

; On masque la version de PHP (réduit la surface de reconnaissance).
expose_php = Off

; Cookies de session durcis (HTTPS only, inaccessibles au JS, anti-CSRF).
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Limites d'upload (témoignages vidéo / images d'avis).
upload_max_filesize = 16M
post_max_size = 20M
