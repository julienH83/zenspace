# Configuration de l'hôte virtuel Apache.
# La racine est volontairement placée sur public/ : c'est le seul dossier
# accessible depuis l'extérieur. Le code applicatif (app/) reste protégé.

# On augmente la taille maximale acceptée pour les en-têtes HTTP.
# Utile en développement local : le navigateur peut accumuler beaucoup de
# cookies sur « localhost » (partagés entre plusieurs projets), ce qui dépasse
# la limite par défaut d'Apache (8 Ko) et provoque une erreur « 400 Bad Request ».
LimitRequestFieldSize 65536
LimitRequestLine 65536

<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- Sécurité serveur ---
    # Les en-têtes de sécurité dynamiques (CSP, X-Frame-Options, nosniff…) sont
    # émis par l'application (App\Core\SecurityHeaders) : source unique, pas de
    # doublon. Ici on se limite à masquer la bannière PHP et à durcir le statique.
    <IfModule mod_headers.c>
        Header always unset X-Powered-By
        # Filet de sécurité pour les fichiers statiques (servis hors PHP) :
        <FilesMatch "\.(css|js|webp|avif|woff2|jpg|jpeg|png|svg)$">
            Header set X-Content-Type-Options "nosniff"
        </FilesMatch>
    </IfModule>

    # --- Cache long pour les ressources statiques ---
    <IfModule mod_headers.c>
        <FilesMatch "\.(css|js|webp|avif|woff2|jpg|jpeg|png|svg)$">
            Header set Cache-Control "public, max-age=2592000"
        </FilesMatch>
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
